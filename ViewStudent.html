

<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<title>Add Student</title>
<style>
    body{font-family: Arial, sans-serif;}
    .form-box{width: 40%; margin: 20px auto; border: 2px solid #4CAF50; padding: 20px; border-radius: 10px; background: #f9f9f9;}
    h2{text-align: center;}
    input{width: 95%; padding: 8px; margin: 5px 0;}
    .btn{background-color: #4CAF50; color: white; padding: 10px; border: 

none; border-radius: 4px; cursor: pointer; width: 100%;}
    nav a{margin: 0 10px; text-decoration: none;}
</style>
</head>
<body>

<header style="text-align:center; padding:10px;">
    <h1>Student Management System</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="Addstudent.html">Add Student</a>
        <a href="ViewStudent.html">View 

Students</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="form-box">
    <h2>Add New Student</h2>
    <form>
        <label>Student ID:</label>
        <input type="text" name="student_id" placeholder="Enter Student ID" required>
        
        <label>Name:</label>
        <input type="text" name="name" placeholder="Enter Name" required>

        
        <label>Department:</label>
        <input type="text" name="department" placeholder="Enter Department" required>
        
        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter Email" required>
        
        <button type="submit" class="btn">Add Student</button>
    </form>
</div>

</body>

</html>
