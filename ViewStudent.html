

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link rel="stylesheet" href="/Student_system/css/style.css">
</head>
<body>

<header>
    <h1>Student Management System</h1>
</header>

<div class="container">
    <div class="form-box">
        <h2>➕ Add New Student</h2>

        <form id="addForm">
            <table>
                <tr>
                    <td><label>Student Full Name:</label></td>
                    <td><input type="text" name="name" required></td>
                </tr>
                <tr>
                    <td><label>Parent:</label></td>
                    <td><input type="text" name="parent"></td>
                </tr>
                <tr>
                    <td><label>Phone Number:</label></td>
                    <td><input type="text" 

name="phone" required></td>
                </tr>
                <tr>
                    <td><label>Grade / Class:</label></td>
                    <td>
                        <select name="grade" required>
                            <option value="">Select Grade</option>
                            <option>Grade 1</option>
                            <option>Grade 2</option>
                            <option>Grade 3</option>
                        </select>
                    </td>

                </tr>
                <tr>
                    <td><label>Address:</label></td>
                    <td><input type="text" name="address"></td>
                </tr>
                <tr>
                    <td colspan="2"><button type="submit">💾 Save Student</button></td>
                </tr>
            </table>
        </form>
        <a href="/Student_system/index.html">Back to Home</a>
    </div>
</div>


<script>
document.getElementById("addForm").addEventListener("submit", function(e){
    e.preventDefault();
    let student = {
        id: Date.now(), // رقم تلقائي
        name: this.name.value,
        parent: this.parent.value,
        phone: this.phone.value,
        dept: this.grade.value,
        email: "", // لو ما عندك ايميل
        address: this.address.value
    };
    let students = JSON.parse(localStorage.getItem("students")) || [];

    students.push(student);
    localStorage.setItem("students", JSON.stringify(students));
    
    alert("Student Saved Successfully ✅");
    this.reset();
});
</script>

</body>
</html>
