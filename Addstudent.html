
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link rel="stylesheet" href="/Student_system/css/style.css">
    <style>
        .form-box{
            width: 400px;
            margin: 30px auto;
            padding: 20px;
            border: 2px solid #2c7a2f;
            border-radius: 10px;
            background: #1a1a1a;
            color: white;
        }

        .form-box input{
            width: 95%;
            padding: 8px;
            margin: 8px 0;
            background: #333;
            border: 1px solid #555;
            color: white;
        }
        .form-box button{
            width: 100%;
            padding: 10px;
            background: #2c7a2f;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .form-box 

button:hover{background: #246428;}
    </style>
</head>
<body>

    <header>
        <h1>Student Management System</h1>
        <nav>
            <a href="/Student_system/index.html">Home</a>
            <a href="/Student_system/Addstudent.html">Add Student</a>
            <a href="/Student_system/ViewStudent.html">View Students</a>
            <a href="/Student_system/login.html">Login</a>

            <a href="/Student_system/register.html">Register</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h2>Add New Student</h2>
            <form>
                <label>Student ID:</label>
                <input type="text" name="id" placeholder="Enter Student ID" required>

                <label>Name:</label>
                <input type="text" name="name" placeholder="Enter Name" required>


                <label>Department:</label>
                <input type="text" name="dept" placeholder="Enter Department" required>

                <label>Email:</label>
                <input type="email" name="email" placeholder="Enter Email" required>

                <button type="submit">Add Student</button>
            </form>
        </div>
    </div>

<script>

document.querySelector("form").addEventListener("submit", function(e){
    e.preventDefault();
    
    let student = {
        id: document.querySelector("input[name='id']").value,
        name: document.querySelector("input[name='name']").value,
        dept: document.querySelector("input[name='dept']").value,
        email: document.querySelector("input[name='email']").value
    };


    let students = JSON.parse(localStorage.getItem("students")) || [];
    students.push(student);
    localStorage.setItem("students", JSON.stringify(students));
    
    alert("Student Added Successfully!");
    this.reset();
});
</script>

</body>
</html>
