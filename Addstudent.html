
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link rel="stylesheet" href="/Student_system/css/style.css">
</head>
<body>

    <header>
        <h1>Student Management System</h1>
        <nav>
            <a href="/Student_system/index.html">Home</a>
            <a href="/Student_system/

Addstudent.html">Add Student</a>
            <a href="/Student_system/ViewStudent.html">View Students</a>
            <a href="/Student_system/login.html">Login</a>
            <a href="/Student_system/register.html">Register</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h2>Add New Student</h2>
            <form id="studentForm">
                <table>
                    <tr>
                        <td><label>Student 

ID:</label></td>
                        <td><input type="text" name="id" placeholder="Enter Student ID" required></td>
                    </tr>
                    <tr>
                        <td><label>Name:</label></td>
                        <td><input type="text" name="name" placeholder="Enter Name" required></td>
                    </tr>
                    <tr>
                        <td><label>Department:</label></td>
                        <td><input type="text" name="dept" placeholder="Enter 

Department" required></td>
                    </tr>
                    <tr>
                        <td><label>Email:</label></td>
                        <td><input type="email" name="email" placeholder="Enter Email" required></td>
                    </tr>
                    <tr>
                        <td colspan="2"><button type="submit">Add Student</button></td>
                    </tr>
                </table>
            </form>

        </div>
    </div>

    <script src="/Student_system/js/script.js"></script>
</body>
</html>
