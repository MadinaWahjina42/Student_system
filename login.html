
<!DOCTYPE html>

<style>

    <nav>

<div class="form-box">
    <h2>Student Login</h2>
    <form>
        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter Email" required>
        
        <label>Password:</label>
        <input type="password" name="password" placeholder="Enter Password" required>
        
        <button type="submit" 

class="btn">Login</button>
    </form>
